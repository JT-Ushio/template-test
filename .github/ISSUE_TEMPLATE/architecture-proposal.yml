name: 🏗️ Architecture proposal
description: Propose and validate one change to the LLM architecture.
title: "[ARCH-PROP] "
labels:
  - "architecture proposal"
  - "review:pending"
assignees:
  - "JT-Ushio"

body:
  - type: markdown
    attributes:
      value: |
        # Architecture proposal

        Use this form to propose **one architecture change** and define how it will be validated.

        Before submitting, make sure you have:

        - identified the exact parent commit;
        - described the change relative to that commit; and
        - provided a reproducible experiment plan with clear success criteria.

        > Keep each proposal focused. Submit unrelated architecture changes separately.

  - type: markdown
    attributes:
      value: |
        ## 1. Basic information

  - type: input
    id: architecture_id
    attributes:
      label: Architecture ID
      description: Enter the stable architecture identifier, or leave this blank if an ID has not been assigned yet.
      placeholder: "Example: olmo3-7b-base"
    validations:
      required: false

  - type: dropdown
    id: proposal_type
    attributes:
      label: Proposal type
      description: Select whether this proposal registers a root architecture or modifies an existing architecture.
      options:
        - Root architecture
        - Architecture modification
    validations:
      required: true

  - type: input
    id: parent_commit
    attributes:
      label: Parent commit
      description: Enter the full Git commit SHA for the parent architecture. For a root architecture, enter `N/A — root architecture`.
      placeholder: "Example: 4f3c21a8d7e6c5b4a39281706f5e4d3c2b1a0987"
    validations:
      required: true

  - type: textarea
    id: related_issues_and_prs
    attributes:
      label: Related issues and pull requests
      description: Link any related Issues or pull requests. Leave this blank if there are none.
      placeholder: |
        - #123
        - https://github.com/owner/repository/pull/456
    validations:
      required: false

  - type: textarea
    id: evidence_and_references
    attributes:
      label: Evidence and references
      description: Add any supporting sources that are available. Delete unused sections if needed.
      value: |
        **Papers or technical reports**

        <!-- Add links as a list: - [Title](URL) -->

        **Relevant implementations**

        <!-- Link relevant repositories, pull requests, or code. -->

        **Experimental evidence**

        <!-- Summarize relevant benchmark results, ablations, or internal analyses. -->
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## 2. Why should we make this change?

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Complete each section below. Guidance in comments will be hidden after submission.
      value: |
        **Current limitation**

        <!-- Describe the problem in the parent architecture and include supporting evidence where possible. -->

        **Research hypothesis**

        <!-- State the expected outcome in a way that can be tested. -->

        **Rationale**

        <!-- Explain why this modification is likely to produce that outcome. -->
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## 3. What will change?

  - type: textarea
    id: proposed_modification
    attributes:
      label: Proposed modification
      description: Complete each section below. Focus on the architecture delta from the parent commit.
      value: |
        **Components affected**

        <!-- List the modules or layers that will change. -->

        **Proposed architecture**

        <!-- Describe the new structure or behavior. Add a diagram if it makes the change easier to understand. -->

        **Key differences**

        <!-- Summarize what is added, removed, or replaced. -->

        **Expected resource impact**

        <!-- Estimate changes to parameter count, compute, memory usage, and latency. -->
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## 4. How will we validate it?

  - type: textarea
    id: experiment_plan
    attributes:
      label: Experiment plan
      description: Complete each section to define a reproducible comparison with the parent architecture.
      value: |
        **Baseline**

        <!-- Identify the baseline configuration and commit. -->

        **Model scale**

        <!-- Specify model size and any scaling assumptions. -->

        **Training data and token budget**

        <!-- Describe datasets, sampling, preprocessing, and total tokens. -->

        **Training configuration**

        <!-- List the relevant hyperparameters and training setup. -->

        **Evaluation datasets and metrics**

        <!-- Define what will be measured and how. -->

        **Compute budget**

        <!-- Estimate hardware, runtime, and total compute. -->

        **Acceptance criteria**

        <!-- State the measurable result required to accept the proposal. -->

        **Rejection criteria**

        <!-- State the result or trade-off that would cause the proposal to be rejected. -->
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---

        ## What happens next?

        Repository maintainers record the decision using a `review:*` label and a structured reviewer comment.

        Proposal authors must not approve their own proposals.
