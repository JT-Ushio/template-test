name: 🏗️ Architecture proposal
description: Propose and validate one change to the LLM architecture.
title: "[ARCH-PROP] "
labels:
  - "architecture proposal"
  - "review:pending"
assignees:
  - "JT-Ushio"

body:
  - type: markdown
    attributes:
      value: |
        # Architecture proposal

        Use this form to propose one architecture change. Keep the proposal focused and submit unrelated changes separately.

  - type: markdown
    attributes:
      value: |
        ## Basic information

  - type: dropdown
    id: proposal_type
    attributes:
      label: Proposal type
      options:
        - Root architecture
        - Modification to an existing architecture
    validations:
      required: true

  - type: input
    id: proposal_name
    attributes:
      label: Architecture or modification name
      description: Give the proposed base architecture or modification a short, descriptive name.
      placeholder: "Example: OLMo 3 7B Base or Sliding-window attention"
    validations:
      required: true

  - type: input
    id: base_architecture
    attributes:
      label: Base architecture
      description: For a modification, provide the architecture ID, model name, or commit SHA. Leave blank for a root architecture.
      placeholder: "Example: olmo3-7b-base at 4f3c21a"
    validations:
      required: false

  - type: textarea
    id: related_work
    attributes:
      label: Related work
      description: Optionally link related issues, pull requests, papers, experiments, or implementations.
      placeholder: |
        - #123
        - [Relevant paper](https://...)
    validations:
      required: false

  - type: textarea
    id: problem_and_hypothesis
    attributes:
      label: Problem and expected outcome
      description: What limitation are you addressing, and what measurable improvement do you expect?
      value: |
        **Problem**

        <!-- Describe the limitation or opportunity. -->

        **Expected outcome**

        <!-- State the expected result in a way that can be tested. -->
    validations:
      required: true

  - type: textarea
    id: proposed_change
    attributes:
      label: Proposed change
      description: Describe the architecture delta from the base architecture.
      value: |
        **What changes**

        <!-- Describe the proposed structure or behavior. -->

        **What remains unchanged**

        <!-- Identify important parts of the base architecture that are unaffected. -->

        **Expected resource impact, if known**

        <!-- Note expected changes to parameters, compute, memory, or latency. -->
    validations:
      required: true

  - type: textarea
    id: validation_plan
    attributes:
      label: Validation plan
      description: Explain how the proposal will be compared and judged.
      value: |
        **Baseline**

        <!-- Identify the comparison architecture or configuration. -->

        **Evaluation and metrics**

        <!-- Describe what will be measured and how. -->

        **Success criteria**

        <!-- State the measurable result required to accept the proposal. -->

        **Compute or data requirements, if known**

        <!-- Summarize any notable experimental requirements. -->
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---

        Repository maintainers record the decision using a `review:*` label and a structured reviewer comment. Proposal authors must not approve their own proposals.
